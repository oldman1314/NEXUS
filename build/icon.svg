<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glowOuter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0A1F"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgRadial)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="256" x2="1024" y2="256" stroke="white" strokeWidth="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="white" strokeWidth="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="white" strokeWidth="1"/>
    <line x1="256" y1="0" x2="256" y2="1024" stroke="white" strokeWidth="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="white" strokeWidth="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="white" strokeWidth="1"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="512" cy="512" r="420" stroke="url(#hexGrad)" strokeWidth="3" fill="none" opacity="0.3" filter="url(#glowOuter)"/>

  <!-- Main Hexagon -->
  <g filter="url(#innerShadow)">
    <path
      d="M512 120 L852 316 L852 708 L512 904 L172 708 L172 316 Z"
      stroke="url(#hexGrad)"
      strokeWidth="16"
      strokeLinejoin="round"
      fill="none"
      opacity="0.95"
    />
  </g>

  <!-- Inner hexagon (subtle) -->
  <path
    d="M512 200 L780 356 L780 668 L512 824 L244 668 L244 356 Z"
    stroke="url(#hexGrad)"
    strokeWidth="2"
    strokeLinejoin="round"
    fill="none"
    opacity="0.15"
  />

  <!-- Data flow lines - Left top to center -->
  <path
    d="M300 362 Q380 430 512 512"
    stroke="url(#flowGrad)"
    strokeWidth="18"
    strokeLinecap="round"
    fill="none"
    opacity="0.9"
  />

  <!-- Data flow lines - Right top to center -->
  <path
    d="M724 362 Q644 430 512 512"
    stroke="url(#flowGrad)"
    strokeWidth="18"
    strokeLinecap="round"
    fill="none"
    opacity="0.9"
  />

  <!-- Data flow line - Center to bottom -->
  <path
    d="M512 512 L512 750"
    stroke="url(#flowGrad)"
    strokeWidth="18"
    strokeLinecap="round"
    fill="none"
    opacity="0.9"
  />

  <!-- Center node (large) -->
  <circle cx="512" cy="512" r="72" fill="url(#hexGrad)" filter="url(#glowOuter)"/>

  <!-- Center node inner highlight -->
  <circle cx="495" cy="495" r="28" fill="white" opacity="0.25"/>

  <!-- Endpoint nodes -->
  <!-- Top left -->
  <circle cx="300" cy="362" r="44" fill="#06B6D4" opacity="0.9" filter="url(#glowOuter)"/>
  <circle cx="288" cy="350" r="16" fill="white" opacity="0.35"/>

  <!-- Top right -->
  <circle cx="724" cy="362" r="44" fill="#3B82F6" opacity="0.9" filter="url(#glowOuter)"/>
  <circle cx="712" cy="350" r="16" fill="white" opacity="0.35"/>

  <!-- Bottom center -->
  <circle cx="512" cy="750" r="44" fill="#8B5CF6" opacity="0.9" filter="url(#glowOuter)"/>
  <circle cx="500" cy="738" r="16" fill="white" opacity="0.35"/>

  <!-- Decorative particles -->
  <circle cx="200" cy="250" r="6" fill="#06B6D4" opacity="0.6"/>
  <circle cx="824" cy="250" r="5" fill="#3B82F6" opacity="0.5"/>
  <circle cx="150" cy="600" r="4" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="874" cy="650" r="7" fill="#D946EF" opacity="0.45"/>
  <circle cx="350" cy="850" r="5" fill="#06B6D4" opacity="0.35"/>
  <circle cx="674" cy="200" r="4" fill="#6366F1" opacity="0.5"/>

  <!-- Subtle corner accents -->
  <path d="M120 120 L180 120 L180 130" stroke="url(#hexGrad)" strokeWidth="3" fill="none" opacity="0.3" strokeLinecap="round"/>
  <path d="M904 120 L844 120 L844 130" stroke="url(#hexGrad)" strokeWidth="3" fill="none" opacity="0.3" strokeLinecap="round"/>
  <path d="M120 904 L180 904 L180 894" stroke="url(#hexGrad)" strokeWidth="3" fill="none" opacity="0.3" strokeLinecap="round"/>
  <path d="M904 904 L844 904 L844 894" stroke="url(#hexGrad)" strokeWidth="3" fill="none" opacity="0.3" strokeLinecap="round"/>
</svg>